spring:
  application:
    name: pkm-box-store-backend

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/pkm_box_store?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:pkm_user}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:true}
        default_batch_fetch_size: ${HIBERNATE_DEFAULT_BATCH_FETCH_SIZE:100}
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:true}
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:true}
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:3600000}
  refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:1209600000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

mail:
  mode: ${MAIL_MODE:LOG}
  from: ${MAIL_FROM:no-reply@pkm-box-store.local}
  host: ${MAIL_HOST:}
  port: ${MAIL_PORT:587}
  username: ${MAIL_USERNAME:}
  password: ${MAIL_PASSWORD:}
  smtp-auth: ${MAIL_SMTP_AUTH:true}
  smtp-starttls-enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}

email:
  verification:
    code-ttl-seconds: ${EMAIL_VERIFICATION_CODE_TTL_SECONDS:300}
    token-ttl-seconds: ${EMAIL_VERIFICATION_TOKEN_TTL_SECONDS:600}
    resend-cooldown-seconds: ${EMAIL_VERIFICATION_RESEND_COOLDOWN_SECONDS:60}
    max-failed-attempts: ${EMAIL_VERIFICATION_MAX_FAILED_ATTEMPTS:5}
    max-sends-per-window: ${EMAIL_VERIFICATION_MAX_SENDS_PER_WINDOW:5}
    send-window-seconds: ${EMAIL_VERIFICATION_SEND_WINDOW_SECONDS:3600}

toss:
  payments:
    secret-key: ${TOSS_PAYMENTS_SECRET_KEY:}
    client-key: ${TOSS_PAYMENTS_CLIENT_KEY:}
    api-url: ${TOSS_PAYMENTS_API_URL:https://api.tosspayments.com}

aws:
  region: ${AWS_REGION:ap-northeast-2}
  access-key: ${AWS_ACCESS_KEY_ID:}
  secret-key: ${AWS_SECRET_ACCESS_KEY:}
  s3:
    bucket: ${AWS_S3_BUCKET:}

logging:
  level:
    org.hibernate.SQL: ${LOGGING_LEVEL_HIBERNATE_SQL:debug}
